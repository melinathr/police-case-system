services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: police_db
      POSTGRES_USER: police_user
      POSTGRES_PASSWORD: police_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    # Better for Docker: no autoreload (prevents weird restarts)
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000 --noreload"
    environment:
      DATABASE_URL: postgres://police_user:police_pass@db:5432/police_db
      DJANGO_DEBUG: "1"
      ALLOWED_HOSTS: "*"
      PAYMENT_GATEWAY: ${PAYMENT_GATEWAY:-mock}
      ZARINPAL_MERCHANT_ID: ${ZARINPAL_MERCHANT_ID:-""}
      ZARINPAL_SANDBOX: ${ZARINPAL_SANDBOX:-0}
      # Frontend is served on host port 5174 (below)
      FRONTEND_PAYMENT_RETURN_URL: ${FRONTEND_PAYMENT_RETURN_URL:-http://localhost:5174/payment/return}
    ports:
      - "8001:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    entrypoint: []
    command: ["npm","run","dev","--","--host","0.0.0.0","--port","5174"]
    ports:
      - "5174:5174"
    # NOTE: no bind-mount volumes by default.
    # On some systems, bind-mounting the frontend folder can cause EPERM when Vite reads index.html.

volumes:
  postgres_data: